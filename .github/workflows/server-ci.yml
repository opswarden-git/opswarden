---
# Server CI — crate Rust `opswarden-server` (workspace cargo à la racine).
#
# Runner : ubuntu-latest (GitHub-hosted) par défaut — zéro infra, défendable au jury.
# Pour basculer sur un runner self-hosted plus tard : remplacer `ubuntu-latest`
# par `self-hosted` sur chaque job. Décision repoussée selon la maturité du projet.
#
# NB : ce dossier est gitignoré pour l'instant (CI dormante). GitHub ne lance que
# les workflows commités — réactiver = retirer `.github/workflows/` du .gitignore.
name: Server CI

"on":
  push:
    branches: ['**']   # VIGIL : lint + tests unitaires sur CHAQUE push de branche
    paths:
      - 'server/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tooling/**'
      - '.github/workflows/server-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tooling/**'
      - '.github/workflows/server-ci.yml'

permissions:
  contents: read

concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Quality & Security (fmt, clippy, audit, deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (warnings = erreurs)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Security audit
        run: cargo audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: License & supply-chain policy (cargo-deny)
        run: cargo deny check --config tooling/deny.toml

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: checks
    # S1: Postgres service for the SQLx integration tests. The query! macros
    # compile from the committed .sqlx cache (SQLX_OFFLINE), so the database is
    # only needed at test runtime; DATABASE_URL points the tests at this service.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: opswarden
          POSTGRES_DB: opswarden
          # Ephemeral CI container on localhost: trust auth, no password to store.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      SQLX_OFFLINE: "true"
      # The CI Postgres runs with trust auth (no password), so DATABASE_URL is a
      # password-less, credential-free URI assembled at runtime from these parts.
      POSTGRES_USER: opswarden
      POSTGRES_DB: opswarden
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Assemble DATABASE_URL
        run: echo "DATABASE_URL=postgres://${POSTGRES_USER}@localhost:5432/${POSTGRES_DB}" >> "$GITHUB_ENV"

      - name: Run database migrations
        run: sqlx migrate run --source server/migrations

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

  coverage:
    name: Coverage (tarpaulin → artifact)
    runs-on: ubuntu-latest
    needs: build-test
    # VIGIL : rapport de couverture publié en artifact sur merge vers main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: opswarden
          POSTGRES_DB: opswarden
          # Ephemeral CI container on localhost: trust auth, no password to store.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      SQLX_OFFLINE: "true"
      # The CI Postgres runs with trust auth (no password), so DATABASE_URL is a
      # password-less, credential-free URI assembled at runtime from these parts.
      POSTGRES_USER: opswarden
      POSTGRES_DB: opswarden
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Assemble DATABASE_URL
        run: echo "DATABASE_URL=postgres://${POSTGRES_USER}@localhost:5432/${POSTGRES_DB}" >> "$GITHUB_ENV"

      - name: Run database migrations
        run: sqlx migrate run --source server/migrations

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Run coverage
        run: cargo tarpaulin --config tooling/tarpaulin.toml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/tarpaulin/
          if-no-files-found: error
