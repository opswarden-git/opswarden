---
# Web CI — client Next.js `opswarden-client-web` (npm workspace à la racine).
#
# Runner : ubuntu-latest par défaut (voir note dans server-ci.yml).
# Reproducible installs : package-lock.json est commité → `npm ci` + cache npm.
name: Web CI

"on":
  push:
    branches: ['**']   # VIGIL : lint + tests unitaires sur CHAQUE push de branche
    paths:
      - 'client-web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'client-web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/web-ci.yml'

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Quality (eslint, prettier, types)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies (workspace)
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint --workspace client-web

      - name: Format check (Prettier)
        run: npm run format:check --workspace client-web

      - name: Type check (tsc)
        run: npm run typecheck --workspace client-web

      - name: Security audit (npm)
        run: npm audit --audit-level=high

  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies (workspace)
        run: npm ci

      - name: Build
        run: npm run build --workspace client-web
