---
# Release pipeline -- DISABLED for now.
# "On remet la CI en marche mais on commente la partie release" : server-ci.yml
# et web-ci.yml tournent, mais ce pipeline reste off tant que :
#   (1) client-desktop existe (build AppImage Tauri, Phase 3), et
#   (2) la publication de l'image vers ghcr.io est decidee.
#
# Etat actuel : trigger manuel uniquement (`workflow_dispatch`) + job no-op, donc
# aucun tag ne declenche de publish par accident. Le vrai pipeline (GitHub
# release + push image ghcr.io + AppImage) est conserve en commentaire dessous.
# Reactiver = restaurer `on.push.tags`, les `permissions`, et decommenter les jobs.
name: Release

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disabled:
    name: Release pipeline is disabled
    runs-on: ubuntu-latest
    steps:
      - run: echo "Release disabled until Phase 3 (desktop) + ghcr publish decision."

