[package]
name = "opswarden-server"
version = "0.1.0"
edition = "2021"
description = "OpsWarden application server (modular hexagonal monolith)"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
