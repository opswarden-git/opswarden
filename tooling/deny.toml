# cargo-deny: supply-chain policy (advisories, licenses, bans, sources).
# Run: cargo deny check --config tooling/deny.toml

[advisories]
version = 2
yanked = "deny"
ignore = []

[bans]
# Permissive on duplicate versions while the dep tree is small; tighten to
# "deny" + a curated skip list once the workspace stabilizes.
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
skip = []

[licenses]
version = 2
# Allowlist of licenses acceptable in the dependency tree.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
