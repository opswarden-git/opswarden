# S0 : server + db uniquement.
# client_web / client_desktop arrivent en Phase 3 (compose final + binaire desktop).
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: opswarden
      POSTGRES_PASSWORD: opswarden
      POSTGRES_DB: opswarden
    ports:
      - "5433:5432"
    volumes:
      # postgres:18+ stores data under /var/lib/postgresql/<version>/ and expects
      # the mount at /var/lib/postgresql (not .../data, the pre-18 convention).
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opswarden"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: postgres://opswarden:opswarden@db:5432/opswarden
      OPSWARDEN_KICKOFF_TOKEN: "Romeo Cavazza VIGIL2026"
      JWT_SECRET: ${JWT_SECRET:-super_secret_dev_key}
      # Phase 2 automation & vault — sourced from .env. Blank stays safe: the
      # server treats an empty value as unset (see config.rs `optional_env`).
      # Set OPSWARDEN_AUTOMATION_TEAM_ID to enable the GitHub CI -> incident rule.
      OPSWARDEN_VAULT_KEY: ${OPSWARDEN_VAULT_KEY:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      OPSWARDEN_AUTOMATION_TEAM_ID: ${OPSWARDEN_AUTOMATION_TEAM_ID:-}
      OPSWARDEN_AUTOMATION_NOTIFY_URL: ${OPSWARDEN_AUTOMATION_NOTIFY_URL:-}
      # The browser-facing web origin in Compose is the client_web service on
      # :8081 (used for the OAuth post-login redirect). Dev runs keep :4242.
      OPSWARDEN_WEB_ORIGIN: ${OPSWARDEN_WEB_ORIGIN:-http://localhost:8081}
      # Google OAuth (optional; blank => Google sign-in disabled).
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8080/api/auth/google/callback}
      GIPHY_API_KEY: ${GIPHY_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Production web surface (Next.js) — the URL-mode target the desktop build
  # loads. Serves the UI on :8081 and proxies /api/* to the server over the
  # compose network; the browser hits the server's published :8080 for the WS.
  client_web:
    build:
      context: .
      dockerfile: client-web/Dockerfile
      args:
        # Both are baked into the Next build: the browser hits the server's
        # published :8080 for the WebSocket; the Next server proxies /api/* to
        # the server over the compose network.
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080/ws}
        OPSWARDEN_API_ORIGIN: http://server:8080
    ports:
      - "${CLIENT_WEB_PORT:-8081}:8081"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:8081/en'',r=>process.exit(r.statusCode<500?0:1)).on(''error'',()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  db_data:
